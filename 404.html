<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Territory.io - Loading...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .loader {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        .bypass-link {
            display: inline-block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .bypass-link:hover {
            background: #2563eb;
        }
        .hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="loading-screen" class="loader">
        <div class="spinner"></div>
        <p>Connecting to Tunnel Server...</p>
        <div id="manual-bypass" style="display: none;">
            <p style="color: #94a3b8; font-size: 14px;">First time connecting? Click below to authorize.</p>
            <a href="https://anthropopathic-tula-photonuclear.ngrok-free.dev/game.html" target="_blank" class="bypass-link" onclick="startIframeAfterDelay()">Authorize & Play</a>
            <p class="hint">Click "Visit Site" on the next page, then return here.</p>
        </div>
    </div>
    
    <iframe id="game-frame" src=""></iframe>

    <script>
        const TUNNEL_URL = 'http://safe-putting.gl.at.ply.gg:21804/game.html';
        const frame = document.getElementById('game-frame');
        const loader = document.getElementById('loading-screen');
        const manualBypass = document.getElementById('manual-bypass');

        function startIframeAfterDelay() {
            setTimeout(() => {
                location.reload();
            }, 2000);
        }

        function loadGame() {
            // Attempt to load directly
            frame.src = TUNNEL_URL;
            
            frame.onload = () => {
                // If it loads successfully, hide loader
                loader.style.display = 'none';
                frame.style.display = 'block';
            };

            // If it hasn't loaded in 4 seconds, show the manual bypass link
            setTimeout(() => {
                if (loader.style.display !== 'none') {
                    manualBypass.style.display = 'block';
                    document.querySelector('.spinner').style.display = 'none';
                    document.querySelector('p').innerText = "Connection taking longer than expected...";
                }
            }, 4000);
        }

        window.addEventListener('DOMContentLoaded', loadGame);
    </script>
</body>
</html>
